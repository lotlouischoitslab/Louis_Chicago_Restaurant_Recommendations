<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago L Eats — Ride the Line, Find Your Meal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E; --blue: #00A1DE; --brown: #62361B; --green: #009B3A;
    --orange: #F9461C; --purple: #522398; --pink: #E27EA6; --yellow: #F9E300;
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a;
    --text: #f0ede8; --muted: #888; --accent: #F9E300;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ---- HERO ---- */
  .hero {
    position: relative; padding: 80px 40px 60px; text-align: center;
    border-bottom: 1px solid var(--border); overflow: hidden;
  }
  .hero-track {
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg,
      var(--red) 0 80px, transparent 80px 100px,
      var(--blue) 100px 180px, transparent 180px 200px,
      var(--brown) 200px 280px, transparent 280px 300px,
      var(--green) 300px 380px, transparent 380px 400px,
      var(--orange) 400px 480px, transparent 480px 500px,
      var(--purple) 500px 580px, transparent 580px 600px
    );
    animation: slide 20s linear infinite;
  }
  @keyframes slide { from { background-position: 0 0; } to { background-position: 600px 0; } }
  .hero h1 {
    font-family: 'Space Mono', monospace; font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700; letter-spacing: -0.02em; line-height: 1.1;
    color: var(--accent); text-shadow: 0 0 40px rgba(249,227,0,0.2);
  }
  .hero h1 span { color: var(--text); }
  .hero p { margin-top: 16px; font-size: 1.1rem; color: var(--muted); max-width: 500px; margin-left: auto; margin-right: auto; margin-top: 16px; }
  .hero-stats { display: flex; gap: 32px; justify-content: center; margin-top: 40px; }
  .stat { text-align: center; }
  .stat-n { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat-l { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  /* ---- LINE DOTS (legend) ---- */
  .lines-legend {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
  }
  .line-badge {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    border-radius: 20px; font-family: 'Space Mono', monospace; font-size: 0.72rem;
    font-weight: 700; cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    border: 2px solid transparent; user-select: none;
  }
  .line-badge:hover { transform: scale(1.05); }
  .line-badge.active { border-color: rgba(255,255,255,0.6); }
  .line-badge.inactive { opacity: 0.3; }
  .line-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ---- CONTROLS ---- */
  .controls {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    padding: 20px 40px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .controls input[type=text] {
    flex: 1; min-width: 200px; padding: 10px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.82rem;
  }
  .controls input[type=text]::placeholder { color: var(--muted); }
  .controls input[type=text]:focus { outline: none; border-color: var(--accent); }
  .controls select {
    padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.82rem; cursor: pointer;
  }
  .controls select:focus { outline: none; border-color: var(--accent); }
  .sort-btn {
    padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 0.75rem; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .sort-btn:hover, .sort-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .count-badge {
    margin-left: auto; font-family: 'Space Mono', monospace; font-size: 0.75rem;
    color: var(--muted); white-space: nowrap;
  }

  /* ---- GRID ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }
  .card {
    background: var(--bg); padding: 24px; display: flex; flex-direction: column;
    gap: 14px; cursor: pointer; transition: background 0.15s;
    position: relative; overflow: hidden;
  }
  .card:hover { background: var(--surface); }
  .card-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-name { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; line-height: 1.3; color: var(--text); }
  .card-rating { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .rating-num { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; }
  .rating-stars { font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .meta-tag {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace;
  }
  .meta-tag.cuisine { border-color: #444; color: #ccc; }
  .meta-tag.price { border-color: var(--accent); color: var(--accent); }
  .card-station { display: flex; align-items: flex-start; gap: 10px; }
  .station-icon { font-size: 11px; background: var(--surface2); padding: 4px 8px; border-radius: 6px; font-family: 'Space Mono', monospace; color: var(--muted); flex-shrink: 0; margin-top: 1px; }
  .station-text { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }
  .station-name { color: var(--text); font-weight: 500; }
  .card-lines { display: flex; gap: 5px; flex-wrap: wrap; }
  .line-pill { width: 20px; height: 8px; border-radius: 4px; }
  .card-comment { font-size: 0.82rem; color: var(--muted); line-height: 1.5; font-style: italic; border-left: 2px solid var(--border); padding-left: 10px; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .card-hood { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-link { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .no-results { padding: 80px 40px; text-align: center; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* ---- MODAL ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
  }
  .modal-hero { padding: 32px 32px 0; position: relative; }
  .modal-hero-bar { height: 4px; border-radius: 2px; margin-bottom: 24px; }
  .modal-title { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--muted);
    font-size: 1rem; cursor: pointer; padding: 4px 10px; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 32px 32px; display: flex; flex-direction: column; gap: 20px; }
  .modal-row { display: flex; gap: 12px; }
  .modal-field { flex: 1; }
  .modal-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .modal-value { font-size: 0.9rem; color: var(--text); }
  .modal-comment-box {
    background: var(--surface2); border-radius: 10px; padding: 16px;
    font-size: 0.88rem; color: var(--text); line-height: 1.6; font-style: italic;
    border-left: 3px solid var(--accent);
  }
  .modal-lines { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .modal-line-pill {
    display: flex; align-items: center; gap: 6px; padding: 5px 14px;
    border-radius: 20px; font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700;
  }
  .modal-cta {
    display: block; text-align: center; background: var(--accent); color: #000;
    text-decoration: none; font-family: 'Space Mono', monospace; font-weight: 700;
    font-size: 0.85rem; padding: 14px; border-radius: 10px; margin-top: 4px;
  }
  .modal-cta:hover { opacity: 0.9; }

  /* ---- FOOTER ---- */
  footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; font-family: 'Space Mono', monospace; }
  footer strong { color: var(--accent); }

  @media (max-width: 600px) {
    .hero { padding: 60px 20px 40px; }
    .hero-stats { gap: 20px; }
    .controls { padding: 16px 20px; }
    .lines-legend { padding: 16px 20px; }
    .grid { grid-template-columns: 1fr; }
    .modal-body, .modal-hero { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>

function getLines(lineStr) {
  if (!lineStr || lineStr === 'Varies') return [];
  return ALL_LINES.filter(l => lineStr.includes(l));
}

function getRatingColor(r) {
  if (r >= 5) return '#F9E300';
  if (r >= 4) return '#009B3A';
  if (r >= 3) return '#00A1DE';
  return '#888';
}

function getPriceLabel(p) {
  if (!p || p === '') return '—';
  const n = parseFloat(p);
  if (isNaN(n)) return '—';
  if (n < 20) return '$';
  if (n < 35) return '$$';
  if (n < 55) return '$$$';
  return '$$$$';
}

let activeLines = new Set(ALL_LINES);
let currentSort = 'rating';
let restaurants = RAW.filter(r => r.Restaurants && r.Restaurants.trim() !== '');

// Populate filters
const cuisines = [...new Set(restaurants.map(r => r['Cuisine'].trim()))].sort();
const neighborhoods = [...new Set(restaurants.map(r => r['Neighborhood']))].sort();
const cuisineEl = document.getElementById('cuisineFilter');
const nbrEl = document.getElementById('neighborhoodFilter');
cuisines.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cuisineEl.appendChild(o); });
neighborhoods.forEach(n => { if (n !== 'Varies') { const o = document.createElement('option'); o.value = n; o.textContent = n; nbrEl.appendChild(o); }});

// Build legend
const legend = document.getElementById('linesLegend');
ALL_LINES.forEach(l => {
  const b = document.createElement('div');
  b.className = 'line-badge active'; b.dataset.line = l;
  b.innerHTML = `<div class="line-dot" style="background:${LINE_COLORS[l]}"></div>${l} Line`;
  b.style.background = LINE_COLORS[l] + '22';
  b.style.color = LINE_COLORS[l];
  b.addEventListener('click', () => toggleLine(l));
  legend.appendChild(b);
});

function toggleLine(line) {
  if (activeLines.has(line)) {
    if (activeLines.size === 1) return;
    activeLines.delete(line);
  } else {
    activeLines.add(line);
  }
  document.querySelectorAll('.line-badge').forEach(b => {
    const l = b.dataset.line;
    b.classList.toggle('active', activeLines.has(l));
    b.classList.toggle('inactive', !activeLines.has(l));
  });
  render();
}

function setSort(s) {
  currentSort = s;
  ['sortRating','sortPrice','sortName'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('sort' + s.charAt(0).toUpperCase() + s.slice(1)).classList.add('active');
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cuisine = document.getElementById('cuisineFilter').value;
  const nbr = document.getElementById('neighborhoodFilter').value;
  const meal = document.getElementById('mealFilter').value;

  return restaurants.filter(r => {
    const lines = getLines(r['L Line [Train]']);
    const hasLine = r['L Line [Train]'] === 'Varies' || lines.some(l => activeLines.has(l)) || lines.length === 0;
    if (!hasLine) return false;
    if (cuisine && r['Cuisine'].trim() !== cuisine) return false;
    if (nbr && r['Neighborhood'] !== nbr) return false;
    if (meal && !r['Meals'].toLowerCase().includes(meal.toLowerCase())) return false;
    if (q && !r['Restaurants'].toLowerCase().includes(q) &&
        !r['Cuisine'].toLowerCase().includes(q) &&
        !r['Nearest CTA L Stop [Train Station]'].toLowerCase().includes(q) &&
        !r['Neighborhood'].toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => {
    if (currentSort === 'rating') {
      const ra = parseFloat(a['Ratings (/5)']) || 0, rb = parseFloat(b['Ratings (/5)']) || 0;
      return rb - ra;
    }
    if (currentSort === 'price') {
      const pa = parseFloat(a['Price $']) || 0, pb = parseFloat(b['Price $']) || 0;
      return pa - pb;
    }
    return a['Restaurants'].localeCompare(b['Restaurants']);
  });
}

function getPrimaryLineColor(lineStr) {
  const lines = getLines(lineStr);
  if (lines.length === 0) return '#444';
  return LINE_COLORS[lines[0]];
}

function buildAccentGradient(lineStr) {
  const lines = getLines(lineStr);
  if (lines.length === 0) return 'background: #444';
  if (lines.length === 1) return `background: ${LINE_COLORS[lines[0]]}`;
  const stops = lines.map((l, i) => `${LINE_COLORS[l]} ${Math.round(i*100/(lines.length-1))}%`).join(', ');
  return `background: linear-gradient(90deg, ${stops})`;
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const countBadge = document.getElementById('countBadge');
  countBadge.textContent = `${filtered.length} spot${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.style.display = 'none'; noResults.style.display = 'block'; return;
  }
  grid.style.display = 'grid'; noResults.style.display = 'none';

  grid.innerHTML = filtered.map((r, i) => {
    const lines = getLines(r['L Line [Train]']);
    const rating = parseFloat(r['Ratings (/5)']);
    const ratingStr = isNaN(rating) ? '—' : rating.toFixed(1);
    const rColor = isNaN(rating) ? '#888' : getRatingColor(rating);
    const linePills = lines.map(l => `<div class="line-pill" style="background:${LINE_COLORS[l]}" title="${l} Line"></div>`).join('');
    const comment = r['Comments by Louis Sungwoo Cho'];
    const showComment = comment && comment !== 'TBD' && comment.length > 3;
    const price = getPriceLabel(r['Price $']);

    return `<div class="card" onclick="openModal(${r.Index})">
      <div class="card-accent-bar" style="${buildAccentGradient(r['L Line [Train]'])}"></div>
      <div class="card-header">
        <div class="card-name">${r['Restaurants']}</div>
        <div class="card-rating">
          <div class="rating-num" style="color:${rColor}">${ratingStr}</div>
          <div class="rating-stars">/5</div>
        </div>
      </div>
      <div class="card-meta">
        <span class="meta-tag cuisine">${r['Cuisine']}</span>
        <span class="meta-tag price">${price}</span>
      </div>
      <div class="card-station">
        <div class="station-icon">CTA</div>
        <div class="station-text"><span class="station-name">${r['Nearest CTA L Stop [Train Station]']}</span></div>
      </div>
      ${linePills ? `<div class="card-lines">${linePills}</div>` : ''}
      ${showComment ? `<div class="card-comment">${comment}</div>` : ''}
      <div class="card-footer">
        <span class="card-hood">${r['Neighborhood']}</span>
        ${r['Menu/Website'] ? `<a class="card-link" href="${r['Menu/Website']}" onclick="event.stopPropagation()" target="_blank">Menu →</a>` : ''}
      </div>
    </div>`;
  }).join('');

  // update 5-star stat
  const fiveStars = restaurants.filter(r => parseFloat(r['Ratings (/5)']) >= 5).length;
  document.getElementById('stat-5star').textContent = fiveStars;
}

function openModal(idx) {
  const r = restaurants.find(x => x.Index === idx);
  if (!r) return;
  const lines = getLines(r['L Line [Train]']);
  const rating = parseFloat(r['Ratings (/5)']);
  const ratingStr = isNaN(rating) ? 'TBD' : rating.toFixed(1) + ' / 5';
  const price = r['Price $'] ? '$' + parseFloat(r['Price $']).toFixed(2) : '—';
  const comment = r['Comments by Louis Sungwoo Cho'];

  document.getElementById('modalBar').style.cssText = buildAccentGradient(r['L Line [Train]']);
  document.getElementById('modalTitle').textContent = r['Restaurants'];

  const linePills = lines.map(l =>
    `<div class="modal-line-pill" style="background:${LINE_COLORS[l]}22; color:${LINE_COLORS[l]}; border: 1px solid ${LINE_COLORS[l]}44">
      <div style="width:10px;height:10px;border-radius:50%;background:${LINE_COLORS[l]}"></div>${l}
    </div>`
  ).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row">
      <div class="modal-field"><div class="modal-label">Neighborhood</div><div class="modal-value">${r['Neighborhood']}</div></div>
      <div class="modal-field"><div class="modal-label">Cuisine</div><div class="modal-value">${r['Cuisine']}</div></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><div class="modal-label">Rating</div><div class="modal-value" style="color:${isNaN(rating)?'#888':getRatingColor(rating)};font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700">${ratingStr}</div></div>
      <div class="modal-field"><div class="modal-label">Avg price</div><div class="modal-value" style="font-family:'Space Mono',monospace">${price}</div></div>
    </div>
    <div>
      <div class="modal-label" style="margin-bottom:8px">CTA Station</div>
      <div class="modal-value" style="font-size:1rem">${r['Nearest CTA L Stop [Train Station]']}</div>
    </div>
    ${linePills ? `<div><div class="modal-label" style="margin-bottom:8px">L Lines</div><div class="modal-lines">${linePills}</div></div>` : ''}
    <div>
      <div class="modal-label">Meals served</div>
      <div class="modal-value" style="margin-top:4px">${r['Meals']}</div>
    </div>
    ${r['Address'] && r['Address'] !== 'Varies' ? `<div><div class="modal-label">Address</div><div class="modal-value" style="font-size:0.85rem;margin-top:4px">${r['Address']}</div></div>` : ''}
    ${comment && comment !== 'TBD' ? `<div class="modal-comment-box">"${comment}"<br><small style="color:var(--muted);margin-top:6px;display:block">— Louis Sungwoo Cho</small></div>` : ''}
    ${r['Menu/Website'] ? `<a href="${r['Menu/Website']}" target="_blank" class="modal-cta">View Menu / Website →</a>` : ''}
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('cuisineFilter').addEventListener('change', render);
document.getElementById('neighborhoodFilter').addEventListener('change', render);
document.getElementById('mealFilter').addEventListener('change', render);

render();
</script>
</body>
</html>
